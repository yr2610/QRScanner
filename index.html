<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR Log Scanner</title>
  <link rel="manifest" href="./manifest.webmanifest?v=3" />
  <meta name="theme-color" content="#111827" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Noto Sans JP",sans-serif; margin:0; background:#0b1020; color:#e5e7eb; }
    header { padding:12px 16px; border-bottom:1px solid #1f2937; display:flex; align-items:center; gap:12px; }
    h1 { font-size:18px; margin:0; }
    main { padding:16px; display:grid; gap:16px; max-width:960px; margin:0 auto; }
    .card { background:#0f172a; border:1px solid #1f2937; border-radius:12px; padding:16px; }
    .row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    button, select { background:#111827; color:#e5e7eb; border:1px solid #374151; border-radius:8px; padding:8px 12px; cursor:pointer; }
    button[disabled]{opacity:.5; cursor:not-allowed;}
    button:hover { background:#1f2937; }
    .muted { color:#9ca3af; font-size:12px; }
    #reader { width:75%; max-width:480px; margin:0; aspect-ratio:4/3; }
    #missing { display:block; max-width:100%; white-space:normal; overflow:hidden; line-height:1.4; max-height:2.8em; }
    textarea { width:100%; height:200px; resize:vertical; background:#0b1020; color:#e5e7eb; border:1px solid #374151; border-radius:8px; padding:8px; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }
    .pill { display:inline-block; padding:2px 8px; border-radius:999px; background:#111827; border:1px solid #374151; font-size:12px; }
    .skipcode-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .skipcode-row code { font-size:18px; letter-spacing:2px; }
  </style>
</head>
<body>
  <header>
    <h1>QR Log Scanner</h1>
    <span class="pill" id="pwaStatus">PWA</span>
  </header>

  <main>
    <section class="card">
      <div class="row">
        <button id="btnStart" disabled>読み取り開始</button>
        <button id="btnStop" disabled>停止</button>
        <button id="btnReset">セッション初期化</button>
        <label>Mode:
          <select id="modeSelect">
            <option value="fountain" selected>Fountain</option>
            <option value="legacy">Legacy Q4</option>
          </select>
        </label>
        <span class="muted">※ HTTPS/localhost でのみカメラ使用可</span>
      </div>
      <div id="reader" class="card"></div>
      <div class="row">
        <label>カメラ: <select id="cameraSelect"></select></label>
        <label><input type="checkbox" id="chkTorch"/> トーチ（対応端末）</label>
      </div>
    </section>

    <section class="card">
      <div class="grid">
        <div>
          <h3 style="margin:0 0 8px">進捗</h3>
          <div class="row" style="gap:16px">
            <div>セッション: <code id="sessionId">(未検出)</code></div>
            <div>受信: <span id="progress">0/0</span></div>
            <div>進捗: <span id="progressPercent">0%</span></div>
            <div>状態: <span id="decodeStatus">待機中</span></div>
            <div>不足: <span id="missing">-</span></div>
          </div>
          <div class="skipcode-row">
            <div>SkipCode32: <code id="skipCode">0000000</code></div>
          </div>
          <p class="muted" style="margin:4px 0 0">7桁入力＝そのまま、6桁以下＝H5T2（途中入力でもOK）。ヘッダのみの場合は不足帯域を31（w/-）で補完します。画面表示の「-」は w と同じ意味です。</p>
          <p class="muted" style="margin-top:8px">QRテキスト形式: <code>Q4|&lt;idxHex&gt;/&lt;totHex&gt;|&lt;sid&gt;|&lt;payload&gt;</code></p>
        </div>
        <div>
          <h3 style="margin:0 0 8px">受信ログ（結合プレビュー）</h3>
          <textarea id="preview" placeholder="受信済みのチャンクを連結して表示"></textarea>
          <div class="row" style="justify-content:flex-end">
            <button id="btnSaveFile" disabled>元ファイル保存</button>
            <button id="btnSaveTxt">.txt として保存</button>
            <button id="btnShareTxt">共有（Gmail/Drive など）</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- html5-qrcode（ローカル同梱推奨） -->
  <script src="./libs/html5-qrcode.min.js?v=3"></script>
  <script type="module">
    import { gunzipSync, unzipSync } from './libs/fflate/esm/browser.js';
    import { bucketRange, encode, pretty } from './skipcode32.js?v=2';
    import { FountainDecoder, base64UrlToBytes, bytesToBase64Url, parseFountainFrame } from './fountain.js?v=2';

    // PWA登録（失敗しても無視）
    (async () => {
      if (window.matchMedia('(display-mode: standalone)').matches)
        document.getElementById('pwaStatus').textContent = 'PWA ✓';
      if ('serviceWorker' in navigator) { try { await navigator.serviceWorker.register('./sw.js?v=7'); } catch {} }
    })();

    // 状態
    let currentSession = null, total = 0;
    const chunks = new Map();
    const els = {
      session: document.getElementById('sessionId'),
      progress: document.getElementById('progress'),
      progressPercent: document.getElementById('progressPercent'),
      decodeStatus: document.getElementById('decodeStatus'),
      missing: document.getElementById('missing'),
      preview: document.getElementById('preview'),
      cameraSelect: document.getElementById('cameraSelect'),
      chkTorch: document.getElementById('chkTorch'),
      btnStart: document.getElementById('btnStart'),
      btnStop: document.getElementById('btnStop'),
      modeSelect: document.getElementById('modeSelect'),
      skipCode: document.getElementById('skipCode'),
      btnSaveFile: document.getElementById('btnSaveFile'),
    };

    const BUCKETS = 32;
    const INITIAL_MASK = 0 >>> 0;
    const INITIAL_SKIP_MASK = (~INITIAL_MASK) >>> 0;
    let lastSkipMask = INITIAL_SKIP_MASK;
    let lastDisplayCode = encode(INITIAL_SKIP_MASK);
    let bucketSetupTotal = 0;
    let bucketSizes = new Uint16Array(BUCKETS);
    let bucketCounts = new Uint16Array(BUCKETS);
    let seenChunks = new Uint8Array(0);
    let fountainDecoder = null;
    let lastFountainHapticStep = -1;

    function applySkipCode(mask, { force = false, vibrate = true } = {}) {
      mask = (mask >>> 0);
      if (!force && mask === lastSkipMask) return;
      const code = encode(mask);
      const shouldUpdate = force || code !== lastDisplayCode;
      lastSkipMask = mask;
      lastDisplayCode = code;
      if (shouldUpdate) {
        els.skipCode.textContent = pretty(code);
        if (!force && vibrate && navigator.vibrate) navigator.vibrate(20);
      }
    }

    function bucketIndexFor(idx) {
      if (!total) return 0;
      const clampedIdx = Math.max(1, Math.min(total, idx));
      return Math.min(BUCKETS - 1, Math.floor(((clampedIdx * BUCKETS) - 1) / total));
    }

    function rebuildBucketState() {
      const T = Math.max(0, Math.floor(total)) >>> 0;
      seenChunks = new Uint8Array(T);
      bucketCounts = new Uint16Array(BUCKETS);
      if (!T) return;
      for (const key of chunks.keys()) {
        const idxNum = Number(key);
        if (!Number.isInteger(idxNum)) continue;
        if (idxNum < 1 || idxNum > T) continue;
        const pos = idxNum - 1;
        if (seenChunks[pos]) continue;
        seenChunks[pos] = 1;
        const bucket = bucketIndexFor(idxNum);
        if (bucketSizes[bucket] > 0 && bucketCounts[bucket] < bucketSizes[bucket]) {
          bucketCounts[bucket]++;
        }
      }
    }

    function prepareBucketsForTotal(newTotal) {
      const T = Math.max(0, Math.floor(newTotal)) >>> 0;
      bucketSetupTotal = T;
      bucketSizes = new Uint16Array(BUCKETS);
      for (let bucket = 0; bucket < BUCKETS; bucket++) {
        const [start, end] = bucketRange(bucket, T);
        bucketSizes[bucket] = end >= start ? (end - start + 1) : 0;
      }
      rebuildBucketState();
      applySkipCode(computeMissingMask(), { force: true, vibrate: false });
    }

    function ensureBucketSetup() {
      if (bucketSetupTotal !== total) {
        prepareBucketsForTotal(total);
      }
    }

    function markChunkSeen(idx) {
      if (!total) return;
      ensureBucketSetup();
      if (idx < 1 || idx > total) return;
      const pos = idx - 1;
      if (seenChunks[pos]) return;
      seenChunks[pos] = 1;
      const bucket = bucketIndexFor(idx);
      const size = bucketSizes[bucket];
      if (!size) return;
      if (bucketCounts[bucket] < size) bucketCounts[bucket]++;
    }

    function computeMissingMask() {
      let mask = 0 >>> 0;
      for (let bucket = 0; bucket < BUCKETS; bucket++) {
        const size = bucketSizes[bucket];
        if (!size) continue;
        if (bucketCounts[bucket] < size) mask |= (1 << (31 - bucket));
      }
      return mask >>> 0;
    }

    function resetSession() {
      currentSession = null; total = 0; chunks.clear();
      els.session.textContent = '(未検出)';
      els.progress.textContent = '0/0';
      els.progressPercent.textContent = '0%';
      els.decodeStatus.textContent = '待機中';
      els.missing.textContent = '-';
      els.preview.value = '';
      if (fountainDecoder && typeof fountainDecoder.free === 'function') fountainDecoder.free();
      fountainDecoder = null;
      bucketSetupTotal = 0;
      bucketSizes = new Uint16Array(BUCKETS);
      bucketCounts = new Uint16Array(BUCKETS);
      seenChunks = new Uint8Array(0);
      lastSkipMask = INITIAL_SKIP_MASK;
      lastDisplayCode = encode(INITIAL_SKIP_MASK);
      lastFountainHapticStep = -1;
      els.skipCode.textContent = pretty(lastDisplayCode);
      updateRecoveredFileButton();
    }
    function updateProgress() {
      const have = chunks.size;
      els.progress.textContent = `${have}/${total}`;
      if (!total) {
        els.progressPercent.textContent = '0%';
        els.decodeStatus.textContent = '待機中';
        els.missing.textContent = '-';
        lastSkipMask = INITIAL_SKIP_MASK;
        lastDisplayCode = encode(INITIAL_SKIP_MASK);
        els.skipCode.textContent = pretty(lastDisplayCode);
        updateRecoveredFileButton();
        return;
      }

      const percent = ((have / total) * 100).toFixed(0);
      els.progressPercent.textContent = `${percent}%`;
      els.decodeStatus.textContent = have === total ? '完了' : 'Legacy Q4';

      const maxDisplay = 20;
      const missShown = [];
      let remainder = 0;
      for (let i = 1; i <= total; i++) {
        const hasChunk = chunks.has(i);
        if (!hasChunk) {
          if (missShown.length < maxDisplay) {
            missShown.push(i);
          } else {
            remainder++;
          }
        }
      }

      if (!missShown.length && remainder === 0) {
        els.missing.textContent = 'なし';
      } else {
        const shown = missShown.join(',');
        els.missing.textContent = remainder > 0 ? `${shown} …(+${remainder})` : shown;
      }

      ensureBucketSetup();
      const missingMask = computeMissingMask();
      applySkipCode(missingMask);

      if (have === total) {
        let out = '';
        for (let i = 1; i <= total; i++) out += chunks.get(i) || '';
        els.preview.value = out;
      }

      updateRecoveredFileButton();
    }

    // 新旧フォーマット対応のパーサ
    function updateFountainProgress() {
      if (!fountainDecoder) {
        els.progress.textContent = '0/0';
        els.progressPercent.textContent = '0%';
        els.decodeStatus.textContent = '待機中';
        els.missing.textContent = '-';
        els.skipCode.textContent = 'fountain';
        updateRecoveredFileButton();
        return;
      }

      const need = fountainDecoder.sourceSymbolCount;
      const received = fountainDecoder.received;
      const cappedReceived = Math.min(received, need);
      const percent = fountainDecoder.complete ? 100 : Math.min(99, Math.floor((cappedReceived / need) * 100));
      els.progress.textContent = `${received}/${need}+`;
      els.progressPercent.textContent = `${percent}%`;
      els.skipCode.textContent = 'fountain';
      applyFountainHaptic(percent, fountainDecoder.complete);

      if (fountainDecoder.complete) {
        els.decodeStatus.textContent = '復元完了';
        els.missing.textContent = `受信 ${received} / 重複 ${fountainDecoder.duplicates}`;
        els.preview.value = bytesToBase64Url(fountainDecoder.recoveredBytes);
      } else if (received >= need) {
        els.decodeStatus.textContent = '復元待ち';
        els.missing.textContent = `受信 ${received} / 追加読み取り中 / 重複 ${fountainDecoder.duplicates}`;
      } else {
        els.decodeStatus.textContent = 'Wirehair受信中';
        els.missing.textContent = `目安あと ${need - received} / 受信 ${received} / 重複 ${fountainDecoder.duplicates}`;
      }

      if (fountainDecoder.lastError) {
        els.missing.textContent += ` / ${fountainDecoder.lastError}`;
      }

      updateRecoveredFileButton();
    }

    function applyFountainHaptic(percent, complete) {
      if (!navigator.vibrate) return;

      const step = complete
        ? 100
        : percent >= 90
          ? percent
          : Math.floor(percent / 10) * 10;
      if (step <= 0 || step <= lastFountainHapticStep) return;

      lastFountainHapticStep = step;
      navigator.vibrate(complete ? [25, 25, 60] : 20);
    }

    function hasRecoveredArchive() {
      if (fountainDecoder?.complete && fountainDecoder.recoveredBytes) return true;
      return total > 0 && chunks.size === total && els.preview.value.trim().length > 0;
    }

    function updateRecoveredFileButton() {
      if (els.btnSaveFile) els.btnSaveFile.disabled = !hasRecoveredArchive();
    }

    async function ingestFountainPayload(text) {
      const frame = parseFountainFrame(text);
      if (!frame) return;

      if (!fountainDecoder) {
        fountainDecoder = await FountainDecoder.create(frame);
        currentSession = frame.sid;
        total = frame.sourceSymbolCount;
        chunks.clear();
        lastFountainHapticStep = -1;
        els.session.textContent = currentSession;
        els.preview.value = '';
      }

      if (frame.sid !== currentSession) return;
      fountainDecoder.accept(frame);
      updateFountainProgress();
    }

    function ingestLegacyPayload(text) {
      // 新: Q4|<idxHex>/<totHex>|<sid>|<payload>
      let m = text.match(/^Q4\|([0-9A-F]{1,4})\/([0-9A-F]{1,4})\|([0-9A-Z]{3,4})\|(.*)$/i);
      let idx, tot, ses, payload;
      if (m) {
        idx = parseInt(m[1], 16);
        tot = parseInt(m[2], 16);
        ses = m[3].toUpperCase();
        payload = m[4];
      } else {
        // 旧: [idx/total]|session|payload（10進）
        m = text.match(/^\[(\d+)\/(\d+)\]\|(.*?)\|(.*)$/s);
        if (!m) return;
        idx = Number(m[1]);
        tot = Number(m[2]);
        ses = m[3];
        payload = m[4];
      }
      if (!(Number.isInteger(idx) && Number.isInteger(tot) && idx>=1 && tot>=1 && idx<=tot)) return;
      if (!currentSession) {
        currentSession = ses;
        total = tot;
        els.session.textContent = currentSession;
        prepareBucketsForTotal(total);
      }
      if (ses !== currentSession || tot !== total) return;
      if (!chunks.has(idx)) {
        chunks.set(idx, payload);
        markChunkSeen(idx);
        updateProgress();
      }
    }

    // カメラ
    let ingestQueue = Promise.resolve();
    function ingestPayload(text) {
      const payload = text.trim();
      const mode = els.modeSelect.value;
      ingestQueue = ingestQueue
        .then(async () => {
          if (mode === 'fountain') {
            await ingestFountainPayload(payload);
          } else {
            ingestLegacyPayload(payload);
          }
        })
        .catch((error) => {
          console.error(error);
          els.decodeStatus.textContent = '読み取りエラー';
          els.missing.textContent = error instanceof Error ? error.message : String(error);
        });
    }

    const html5Qr = new window.Html5Qrcode('reader');
    let running = false;
    async function listCameras() {
      try {
        const devices = await window.Html5Qrcode.getCameras();
        els.cameraSelect.innerHTML = '';
        if (!devices || !devices.length) {
          const o = document.createElement('option'); o.text = '（カメラ検出なし）'; els.cameraSelect.add(o); return;
        }
        devices.forEach(d => { const o=document.createElement('option'); o.value=d.id; o.text=d.label||d.id; els.cameraSelect.add(o); });
        els.btnStart.disabled = false;
      } catch {
        const o = document.createElement('option'); o.text = '（列挙失敗）'; els.cameraSelect.add(o);
      }
    }

    async function start() {
      if (running) return;
      const camId = els.cameraSelect.value || undefined;
      await html5Qr.start(
        camId ? { deviceId: { exact: camId } } : { facingMode: 'environment' },
        { fps: 15, qrbox: { width: 480, height: 360 } },
        (t)=> ingestPayload(t.trim()),
        ()=>{}
      );
      running = true; els.btnStart.disabled = true; els.btnStop.disabled = false;
    }
    async function stop() {
      if (!running) return;
      await html5Qr.stop();
      running = false; els.btnStart.disabled = false; els.btnStop.disabled = true;
    }

    els.chkTorch.addEventListener('change', async (ev) => {
      try { await html5Qr.applyVideoConstraints({ advanced: [{ torch: ev.target.checked }] }); } catch {}
    });

    function getRecoveredArchiveBytes() {
      if (fountainDecoder?.complete && fountainDecoder.recoveredBytes) {
        return fountainDecoder.recoveredBytes;
      }

      const text = els.preview.value.trim();
      if (!text) return null;
      return base64UrlToBytes(text.replace(/\s+/g, ''));
    }

    async function tryExtractSingleRootFileFromZip(bytes) {
      if (!looksZip(bytes)) return null;

      const files = unzipSync(bytes);
      const names = Object.keys(files).filter(name => !name.endsWith('/'));
      if (names.length !== 1) return null;

      const name = names[0];
      if (/[\\/]/.test(name)) return null;
      return {
        name: sanitizeDownloadName(name),
        bytes: files[name],
      };
    }

    function looksZip(bytes) {
      return bytes.length >= 4 &&
        bytes[0] === 0x50 && bytes[1] === 0x4b &&
        bytes[2] === 0x03 && bytes[3] === 0x04;
    }

    function looksGzip(bytes) {
      return bytes.length >= 2 && bytes[0] === 0x1f && bytes[1] === 0x8b;
    }

    function maybeGunzip(bytes) {
      if (!looksGzip(bytes)) return bytes;
      try {
        return gunzipSync(bytes);
      } catch {
        return bytes;
      }
    }

    function sanitizeDownloadName(name) {
      const trimmed = name.split(/[\\/]/).pop()?.trim() || 'decoded.bin';
      const cleaned = trimmed.replace(/[<>:"/\\|?*\x00-\x1f]/g, '_');
      const stem = cleaned.replace(/\.[^.]*$/, '') || 'decoded';
      const ext = cleaned.includes('.') ? cleaned.slice(cleaned.lastIndexOf('.')) : '.bin';
      return `${stem}${ext}`;
    }

    function mimeForName(name) {
      const lower = name.toLowerCase();
      if (lower.endsWith('.jpg') || lower.endsWith('.jpeg')) return 'image/jpeg';
      if (lower.endsWith('.png')) return 'image/png';
      if (lower.endsWith('.gif')) return 'image/gif';
      if (lower.endsWith('.webp')) return 'image/webp';
      if (lower.endsWith('.txt') || lower.endsWith('.log')) return 'text/plain';
      if (lower.endsWith('.json')) return 'application/json';
      if (lower.endsWith('.zip')) return 'application/zip';
      return 'application/octet-stream';
    }

    function downloadBytes(bytes, fileName, mimeType) {
      const blob = new Blob([bytes], { type: mimeType });
      const a = document.createElement('a');
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = fileName;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function getResultBlob() { return new Blob([els.preview.value || ''], { type: 'text/plain' }); }
    document.getElementById('btnSaveFile').addEventListener('click', async () => {
      try {
        const recoveredBytes = getRecoveredArchiveBytes();
        if (!recoveredBytes) {
          alert('復元済みデータがありません。');
          return;
        }

        const archiveBytes = maybeGunzip(recoveredBytes);
        let extracted = null;
        try {
          extracted = await tryExtractSingleRootFileFromZip(archiveBytes);
        } catch (error) {
          console.warn(error);
        }

        if (extracted) {
          downloadBytes(extracted.bytes, extracted.name, mimeForName(extracted.name));
        } else {
          downloadBytes(archiveBytes, `qrlog-${currentSession||'session'}.zip`, 'application/zip');
        }
      } catch (error) {
        alert(`ファイル保存に失敗しました: ${error instanceof Error ? error.message : String(error)}`);
      }
    });
    document.getElementById('btnSaveTxt').addEventListener('click', () => {
      const blob = getResultBlob(); const a=document.createElement('a'); const url=URL.createObjectURL(blob);
      a.href=url; a.download=`qrlog-${currentSession||'session'}-${new Date().toISOString().replace(/[:.]/g,'-')}.txt`;
      a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    });
    document.getElementById('btnShareTxt').addEventListener('click', async () => {
      const file = new File([getResultBlob()], `qrlog-${currentSession||'session'}.txt`, { type:'text/plain' });
      if (navigator.canShare && navigator.canShare({ files:[file] })) {
        try { await navigator.share({ files:[file], title:'QR Log', text:'連結ログ' }); } catch {}
      } else {
        const a=document.createElement('a'); const url=URL.createObjectURL(file);
        a.href=url; a.download=file.name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
      }
    });

    (async () => {
      resetSession();
      await listCameras();
      if (els.modeSelect.value === 'fountain') updateFountainProgress(); else updateProgress();
    })();
    document.getElementById('btnStart').addEventListener('click', start);
    document.getElementById('btnStop').addEventListener('click', stop);
    document.getElementById('btnReset').addEventListener('click', resetSession);
    els.modeSelect.addEventListener('change', () => {
      resetSession();
      if (els.modeSelect.value === 'fountain') updateFountainProgress(); else updateProgress();
    });
  </script>
</body>
</html>
